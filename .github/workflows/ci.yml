name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: swift build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build debug
        run: swift build

      - name: Build release
        run: swift build -c release
